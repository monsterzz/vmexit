<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vmExit</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app-header">
    <select id="app-selector"></select>
    <button id="new-app-btn">+ New App</button>
    <span id="console-hint">press <kbd>`</kbd> to open console</span>
  </div>
  <div id="desktop"></div>

  <div id="console">
    <div id="console-output"></div>
    <div class="console-input-row">
      <span class="prompt">&gt;</span>
      <input type="text" id="console-input" placeholder="talk to vmExit..." />
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/app.js" type="module"></script>
</body>
</html>
